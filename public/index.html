<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FDeploy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1><span>F</span>Deploy</h1>
  <span id="exeBadge" class="badge badge-no">Nenhum .exe</span>
</div>

<div class="container">

  <!-- Upload -->
  <div class="section">
    <div class="section-title">Arquivo para Deploy</div>
    <div class="drop-zone" id="dropZone">
      <p>Arraste o <strong>Fvendas2.0.exe</strong> aqui</p>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('fileInput').click()">Selecionar arquivo</button>
      <input type="file" id="fileInput" accept=".exe" style="display:none">
    </div>
    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
    <div class="upload-info" id="uploadInfo" style="display:none"></div>
  </div>

  <!-- Servidores -->
  <div class="section">
    <div class="section-title">Servidores</div>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="abrirModal()">+ Adicionar</button>
      <button class="btn btn-ghost" onclick="verificarTodos()">Verificar Todos</button>
      <button class="btn btn-warning" onclick="atualizarTodos()">Atualizar Todos</button>
    </div>
    <div id="serverList"></div>
  </div>

  <!-- Histórico -->
  <div class="section">
    <div class="historico-toggle" onclick="toggleHistorico()">Historico de deploys &#9660;</div>
    <div id="historicoContent" style="display:none">
      <table class="historico-table">
        <thead><tr><th>Data</th><th>Servidor</th><th>Status</th><th>Duracao</th></tr></thead>
        <tbody id="historicoBody"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Adicionar Servidor</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>Nome do cliente *</label>
      <input type="text" id="fNome" placeholder="Ex: Agrominas">
    </div>
    <div class="form-group">
      <label>IP ou DDNS *</label>
      <input type="text" id="fIp" placeholder="Ex: 192.168.1.100">
    </div>
    <div class="form-group">
      <label>Porta SSH</label>
      <input type="number" id="fPorta" value="22">
    </div>
    <div class="form-group">
      <label>Usuario SSH *</label>
      <input type="text" id="fUsuario" placeholder="Ex: administrador">
    </div>
    <div class="form-group">
      <label>Senha SSH *</label>
      <input type="password" id="fSenha">
    </div>
    <div class="form-group">
      <label>Descricao</label>
      <input type="text" id="fDescricao" placeholder="Ex: Servidor principal">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-ghost" id="btnTestarConexao" onclick="testarConexaoModal()">Testar conexao</button>
      <button class="btn btn-primary" onclick="salvarServidor()">Salvar</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
